<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GoalGPT — Football Prediction AI{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block styles %}{% endblock %}
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <i class="fa-solid fa-circle-nodes logo-icon"></i>
                <div>
                    <h1>GoalGPT</h1>
                    <span class="tagline">Championship-Grade Football Prediction Engine</span>
                </div>
            </div>
            
            <nav class="app-nav">
                <a href="/" class="nav-btn {% if active_page == 'home' %}active{% endif %}">Home</a>
                <a href="/documentation" class="nav-btn {% if active_page == 'documentation' %}active{% endif %}">Documentation</a>
            </nav>

            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 GoalGPT. Powered by Python 3.12, scikit-learn, and Cloudpickle.</p>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
